
<!DOCTYPE html><html>
<head>
<title>Admin</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:20px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#007bff;color:#fff}
</style>
</head>
<body>
<h2>Admin Results Panel</h2>
<table>
<tr><th>Name</th><th>Reg</th><th>Score</th><th>%</th><th>Date</th></tr>
<tbody id="res"></tbody>
</table>
<script>
let data=JSON.parse(localStorage.getItem("results")||"[]");
data.forEach(r=>{
res.innerHTML+=`<tr><td>${r.name}</td><td>${r.reg}</td><td>${r.score}/${r.total}</td><td>${r.percent}%</td><td>${r.date}</td></tr>`;
});
</script>
</body>
</html>
