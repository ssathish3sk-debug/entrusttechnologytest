<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body{font-family:Arial;background:#f4f6f9;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#fff;padding:25px;border-radius:10px;width:300px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:5px}
button{background:#007bff;color:white;border:none}
</style>
</head>
<body>
<div class="card">
<h2>IT Exam Login</h2>
<input id="name" placeholder="Name">
<input id="reg" placeholder="Register No">
<button onclick="startExam()">Start Exam</button>
</div>
<script>
function startExam(){
let n=name.value.trim();
let r=reg.value.trim();
if(!n||!r){alert("Enter details");return;}
localStorage.setItem("studentName",n);
localStorage.setItem("studentReg",r);
location='exam.html';
}
</script>
</body>
</html>
